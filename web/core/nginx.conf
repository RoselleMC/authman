server {
  listen 8080 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache built static assets aggressively.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|map)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Never cache runtime config.
  location = /config.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  # Keep browser requests same-origin. The Go service owns the /api prefix.
  location ^~ /api/ {
    proxy_pass http://authman:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}
