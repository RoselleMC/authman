services:
  authman:
    build:
      context: ..
      dockerfile: authman/Dockerfile
    environment:
      AUTHMAN_HTTP_ADDR: ":8080"
      AUTHMAN_DATABASE_URL: "postgres://authman:authman@postgres:5432/authman?sslmode=disable"
      AUTHMAN_PUBLIC_BASE_URL: "${AUTHMAN_PUBLIC_BASE_URL:-http://localhost:8080}"
      AUTHMAN_ADMIN_USERNAME: "admin"
      AUTHMAN_ADMIN_EMAIL: "admin@authman.local"
      AUTHMAN_ADMIN_PASSWORD: "authman-admin-change-me"
      AUTHMAN_NODE_ACCESS_TOKEN: "authman-node-change-me"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: authman
      POSTGRES_USER: authman
      POSTGRES_PASSWORD: authman
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authman -d authman"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  core-web:
    build:
      context: ./web
      dockerfile: core/Dockerfile
    environment:
      AUTHMAN_API_BASE: "/api"
      AUTHMAN_DEFAULT_LOCALE: "zh"
    ports:
      - "18081:8080"
    depends_on:
      - authman

  authman-limbo:
    build:
      context: ..
      dockerfile: authman/Dockerfile.limbo
    environment:
      AUTHMAN_CORE_URL: "http://authman:8080"
      AUTHMAN_NODE_TOKEN: "${AUTHMAN_LIMBO_NODE_TOKEN:-authman-node-change-me}"
      AUTHMAN_NODE_NAME: "limbo-portal"
      AUTHMAN_LIMBO_LISTEN: ":25565"
      AUTHMAN_LIMBO_DEFAULT_HOST: "default"
      AUTHMAN_LIMBO_LOGIN_MODE: "${AUTHMAN_LIMBO_LOGIN_MODE:-hybrid}"
      AUTHMAN_LIMBO_ONLINE_SERVER_ID: "${AUTHMAN_LIMBO_ONLINE_SERVER_ID:-authman-limbo}"
    ports:
      - "25665:25565"
    depends_on:
      - authman

volumes:
  postgres-data:
