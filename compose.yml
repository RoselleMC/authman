services:
  authman:
    build:
      context: ..
      dockerfile: authman/core/Dockerfile
      args:
        GOPROXY: "${GOPROXY:-https://proxy.golang.org,direct}"
    environment:
      AUTHMAN_HTTP_ADDR: ":8081"
      AUTHMAN_EXTERNAL_HTTP_ADDR: ":8080"
      AUTHMAN_DATABASE_URL: "postgres://authman:authman@postgres:5432/authman?sslmode=disable"
      AUTHMAN_PUBLIC_BASE_URL: "${AUTHMAN_PUBLIC_BASE_URL:-http://localhost:18081}"
      AUTHMAN_PLAYER_PORTAL_BASE_URL: "${AUTHMAN_PLAYER_PORTAL_BASE_URL:-http://localhost:18082}"
      AUTHMAN_IP_GEO_DATA_DIR: "/var/lib/authman/ipgeo"
      AUTHMAN_DEFAULT_LOCALE: "zh"
      AUTHMAN_ADMIN_USERNAME: "admin"
      AUTHMAN_ADMIN_EMAIL: "admin@authman.local"
      AUTHMAN_ADMIN_PASSWORD: "authman-admin-change-me"
      AUTHMAN_NODE_ACCESS_TOKEN: "authman-node-change-me"
    ports:
      - "8080:8080"
      - "18081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ipgeo-data:/var/lib/authman/ipgeo

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: authman
      POSTGRES_USER: authman
      POSTGRES_PASSWORD: authman
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authman -d authman"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  authman-limbo:
    build:
      context: ..
      dockerfile: authman/limbo/Dockerfile
      args:
        GOPROXY: "${GOPROXY:-https://proxy.golang.org,direct}"
    network_mode: host
    environment:
      AUTHMAN_CORE_URL: "${AUTHMAN_LIMBO_CORE_URL:-http://127.0.0.1:18081}"
      AUTHMAN_NODE_TOKEN: "${AUTHMAN_LIMBO_NODE_TOKEN:-authman-node-change-me}"
      AUTHMAN_NODE_NAME: "limbo-portal"
      AUTHMAN_LIMBO_LISTEN: "${AUTHMAN_LIMBO_LISTEN:-:25665}"
      AUTHMAN_LIMBO_DEFAULT_HOST: "default"
      AUTHMAN_LIMBO_LOGIN_MODE: "${AUTHMAN_LIMBO_LOGIN_MODE:-hybrid}"
      AUTHMAN_LIMBO_ONLINE_SERVER_ID: "${AUTHMAN_LIMBO_ONLINE_SERVER_ID:-authman-limbo}"
      AUTHMAN_LIMBO_LOG_LEVEL: "${AUTHMAN_LIMBO_LOG_LEVEL:-info}"
      AUTHMAN_LIMBO_PROXY_TRUSTED_PROXIES: "${AUTHMAN_LIMBO_PROXY_TRUSTED_PROXIES:-}"
      AUTHMAN_LIMBO_PROXY_HEADER_TIMEOUT_MILLIS: "${AUTHMAN_LIMBO_PROXY_HEADER_TIMEOUT_MILLIS:-5000}"
    depends_on:
      - authman

volumes:
  postgres-data:
  ipgeo-data:
