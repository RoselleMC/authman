mode: "portal"

api:
  base-url: "http://127.0.0.1:8080"
  node-token: ""
  request-timeout-seconds: 8

node:
  name: "velocity"
  server-id: "default"
  heartbeat-interval-seconds: 60

identity:
  resolve-raw-offline-names: true

auth:
  max-password-attempts: 3
  chat-cooldown-millis: 150
  timeout-seconds: 90
  completion-delay-seconds: 3

servers:
  default-target: ""
  holding: ""

portal:
  # Optional override when this Portal always targets one Core downstream server.
  server-id: ""
  # Optional hostname sent by the client/domain. Core can map portal-hosts to a downstream target.
  requested-host: ""
  # Used by Gate source allow-lists and audit logs.
  source-id: ""

gate:
  # Velocity server name behind the gate. Empty means use Velocity's normal initial server.
  initial-server: ""
  # Optional quarantine server while waiting for the transfer cookie. Direct
  # connections can only reach this server and are disconnected on timeout.
  holding-server: ""
  transfer-cookie-key: "authman:transfer_grant"
  validation-timeout-seconds: 10

dialog:
  enabled: true
  # Keep this enabled for JS bot and old-client regression compatibility.
  fallback-chat: true

email:
  # disabled, optional, or required. Email flows are backed by Authman APIs.
  verification-mode: "disabled"

packets:
  strip-offline-prefix:
    enabled: false
    player-info-packets: true
    scoreboard-team-packets: true
    # If Authman reports a premium player with the same name exists, keep #Name unless this is true.
    strip-when-premium-name-exists: false
